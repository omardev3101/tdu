services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: tdu_backend
    ports:
      - "3005:3000" # Usando 3005 para evitar conflito na 3000
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - tdu_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IMPORTANTE: Se for rodar local, use seu IP (ex: http://192.168.1.9:3000)
        # Se for no Render, use a URL que o Render te deu.
        - VITE_API_URL=http://localhost:3000
    container_name: tdu_frontend
    ports:
      - "5180:80" # Usando 5180 para evitar conflitos
    restart: always
    depends_on:
      - backend
    networks:
      - tdu_network

networks:
  tdu_network:
    driver: bridge