services:
  backend:
    build: ./backend
    container_name: tdu_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: tdu_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      # AQUI ESTÁ O SEGREDO: Use sempre o IP da máquina na rede
      - VITE_API_URL=http://192.168.1.9:3000
    depends_on:
      - backend
    restart: always