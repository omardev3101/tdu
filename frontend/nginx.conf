server {
    listen 80;
    server_name localhost;

    # Serve a aplicação na rota /7caveiras/
    location /7caveiras/ {
        alias /usr/share/nginx/html/7caveiras/;
        index index.html index.htm;
        # Tenta servir o arquivo, depois pasta, depois cai no index (para React Router)
        try_files $uri $uri/ /7caveiras/index.html;
    }

    # Redireciona /7caveiras (sem barra) para /7caveiras/
    location = /7caveiras {
        return 301 /7caveiras/;
    }

    # Redireciona a raiz para /7caveiras/ por conveniência dentro do container
    location / {
        return 301 /7caveiras/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}